name: Commit Message Check

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  validate-commit-message:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate commit messages
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            COMMITS=$(git log --format=%s origin/${{ github.base_ref }}..HEAD)
          else
            BEFORE="${{ github.event.before }}"
            AFTER="${{ github.sha }}"

            if [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
              COMMITS=$(git log --format=%s "$AFTER")
            else
              COMMITS=$(git log --format=%s "$BEFORE..$AFTER")
            fi
          fi

          echo "$COMMITS"

          REGEX='^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert)(\([a-z0-9_-]+\))?!?: .{1,72}$'

          while IFS= read -r msg; do
            if ! [[ "$msg" =~ $REGEX ]]; then
              echo "❌ Invalid commit message:"
              echo "   $msg"
              echo ""
              echo "Expected format:"
              echo "type(scope): description"
              echo ""
              echo "Examples:"
              echo "feat(auth): add login endpoint"
              echo "fix(api): prevent null pointer"
              exit 1
            fi
          done <<< "$COMMITS"

          echo "✅ All commit messages are valid."
