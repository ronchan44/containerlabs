name: Commit Message Check

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  validate-commit-message:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate last 3 commit messages
        shell: bash
        run: |
          COMMITS=$(git log -3 --format=%s)
          echo "Checking last 3 commit messages:"
          echo "$COMMITS"

          # Define ignore patterns (regex)
          IGNORE_PATTERNS=(
            "^Merge"
            "^dependabot"
            "^chore\\(release\\):"
          )

          # Conventional commit regex
          REGEX='^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert)(\([a-z0-9_-]+\))?!?: .{1,72}$'

          while IFS= read -r msg; do
            # Skip empty lines
            [ -z "$msg" ] && continue

            # Check ignore patterns
            for pattern in "${IGNORE_PATTERNS[@]}"; do
              if [[ "$msg" =~ $pattern ]]; then
                echo "ℹ️ Skipping commit due to ignore pattern: $pattern"
                continue 2
              fi
            done

            # Validate against regex
            if ! [[ "$msg" =~ $REGEX ]]; then
              echo "❌ Invalid commit message:"
              echo "   $msg"
              echo ""
              echo "Expected format:"
              echo "type(scope): description"
              echo ""
              echo "Examples:"
              echo "feat(auth): add login endpoint"
              echo "fix(api): prevent null pointer"
              exit 1
            fi
          done <<< "$COMMITS"

          echo "✅ Last 3 commit messages are valid."
